<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtCoder-Battle</title>
    <link rel="stylesheet" href="https://unpkg.com/modern-css-reset/dist/reset.min.css">
    <link rel="stylesheet" href="/static/base.css">
</head>

<!-- 一旦二人のユーザーデータを受け取ってスクレイピングする -->

<body>

    <h1>結果の表示</h1>

    <h2>
        <div>
            <!-- データの表示方法を編集-->

            {{range .results}}
            <p>{{.ContestShortName}}</p>
            <p>{{.WinUser}}</p>
            <p>{{.User1Place}}</p>
            <p>{{.User2Place}}</p>
            {{end}}



        </div>
    </h2>

</body>



</html>
