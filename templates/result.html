<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtCoder-Battle</title>
    <link rel="stylesheet" href="https://unpkg.com/modern-css-reset/dist/reset.min.css">
    <link rel="stylesheet" href="/static/base.css">
</head>

<!-- 一旦二人のユーザーデータを受け取ってスクレイピングする -->

<body>

    <h1>結果の表示</h1>

    <h2>
        <div>
            <!-- データの表示方法を編集-->
            <!-- {{.results}} -->

            {{range .results}}

            <div>
                <p>{{.User1Name}}</p>
                <p>{{.User2Name}}</p>
                <p>{{.User1Wins}}</p>
                <p>{{.User2Wins}}</p>
                <p>{{.Draw}}</p>
                <p>{{.total}}</p>
                <p>{{.Results}}</p>
            </div>
            {{end}}
    </h2>

</body>



</html>
