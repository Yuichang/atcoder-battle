<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtCoder-Battle</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>AtCoder-Battle</h1>
    <h2>複数のAtCoderユーザーの名前を入力すると、共通のRatedコンテストを調べて勝敗を出します</h2>
    <form action="result.html" method="get">
        <!-- 後日複数ユーザー対応 -->
        <!-- <button id="add-btn">ユーザーを増やす</button> -->

        <input type="text" name="user1" placeholder="ユーザー1" required>
        <input type="text" name="user2" placeholder="ユーザー2" required>

        <button type="submit" id="submit-btn">勝敗を出す</button>
    </form>

</body>

</html>
